name: OSS to ClickHouse Pipeline

on:
  workflow_dispatch:
    inputs:
      run_import:
        description: "Import OSS raw data into ClickHouse"
        required: true
        type: boolean
        default: true
      daily_limit:
        description: "Number of daily files to import for smoke runs; use 0 for full import"
        required: true
        default: "5"
      run_compute:
        description: "Compute price index after import"
        required: true
        type: boolean
        default: true
      upload_result:
        description: "Upload generated result files to OSS result/"
        required: true
        type: boolean
        default: true

jobs:
  pipeline:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: py -m pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        shell: powershell
        run: |
          @"
          OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT=${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET=${{ secrets.OSS_BUCKET }}
          CLICKHOUSE_HOST=${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT=${{ secrets.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER=${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DB=${{ secrets.CLICKHOUSE_DB }}
          CLICKHOUSE_SECURE=${{ secrets.CLICKHOUSE_SECURE }}
          CLICKHOUSE_VERIFY=${{ secrets.CLICKHOUSE_VERIFY }}
          "@ | Set-Content -Path .env -Encoding utf8

      - name: Validate required secrets
        shell: powershell
        run: |
          $required = @(
            "OSS_ACCESS_KEY_ID",
            "OSS_ACCESS_KEY_SECRET",
            "OSS_ENDPOINT",
            "OSS_BUCKET",
            "CLICKHOUSE_HOST",
            "CLICKHOUSE_PORT",
            "CLICKHOUSE_USER",
            "CLICKHOUSE_PASSWORD",
            "CLICKHOUSE_DB"
          )
          $values = @{}
          Get-Content .env | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") {
              $values[$Matches[1]] = $Matches[2]
            }
          }
          $missing = $required | Where-Object { -not $values.ContainsKey($_) -or [string]::IsNullOrWhiteSpace($values[$_]) }
          if ($missing.Count -gt 0) {
            throw "Missing GitHub Secrets: $($missing -join ', ')"
          }
          Write-Host "Required secrets are present."

      - name: Compile Python scripts
        shell: powershell
        run: |
          $files = Get-ChildItem scripts -Filter *.py | ForEach-Object { $_.FullName }
          py -m py_compile @files

      - name: Initialize ClickHouse schema
        shell: powershell
        run: py scripts\init_clickhouse.py

      - name: Import OSS data into ClickHouse
        if: ${{ inputs.run_import }}
        shell: powershell
        run: |
          if ("${{ inputs.daily_limit }}" -eq "0") {
            py scripts\load_from_oss_to_clickhouse.py --full
          } else {
            py scripts\load_from_oss_to_clickhouse.py --limit "${{ inputs.daily_limit }}"
          }

      - name: Compute price index
        if: ${{ inputs.run_compute }}
        shell: powershell
        run: py scripts\compute_index.py

      - name: Generate charts and CSV
        if: ${{ inputs.run_compute }}
        shell: powershell
        run: py scripts\plot_index.py

      - name: Upload result files to OSS
        if: ${{ inputs.upload_result && inputs.run_compute }}
        shell: powershell
        run: py scripts\upload_result_to_oss.py

      - name: Upload result artifacts
        if: ${{ inputs.run_compute }}
        uses: actions/upload-artifact@v4
        with:
          name: price-index-results
          path: output/
